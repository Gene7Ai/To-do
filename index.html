<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的待办清单</title>
  <meta name="theme-color" content="#6366f1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-bg"></div>

  <main class="container">
    <section class="app-card">
      <header class="app-header">
        <div class="app-badge">Todo App</div>
        <h1>我的待办清单</h1>
        <p class="app-subtitle">持之以恒。</p>
      </header>

      <section class="summary-card">
        <div class="summary-top">
          <div>
            <p class="summary-label">今日进度</p>
            <strong id="progress-text">0%</strong>
          </div>
          <span class="summary-note">坚持不懈</span>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </section>

      <div class="input-area">
        <input type="text" id="todo-input" placeholder="比如：鉴赏小胖墩视频">
        <button id="add-btn">添加任务</button>
      </div>

      <div class="filter-area">
        <button id="filter-all" class="active">全部</button>
        <button id="filter-active">未完成</button>
        <button id="filter-completed">已完成</button>
      </div>

      <div class="stats-area">
        <div class="stat-card">
          <span class="stat-label">总任务</span>
          <strong id="total-count">0</strong>
        </div>

        <div class="stat-card">
          <span class="stat-label">未完成</span>
          <strong id="active-count">0</strong>
        </div>

        <div class="stat-card">
          <span class="stat-label">已完成</span>
          <strong id="completed-count">0</strong>
        </div>
      </div>

      <ul id="todo-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
